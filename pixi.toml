[workspace]
authors = ["Fredrick Eisele <fred.eisele@vanderbilt.edu>"]
channels = ["https://prefix.dev/meso-forge", "conda-forge"]
name = "sysml-v2-cli"
platforms = ["linux-64"]
version = "0.1.0"

[tasks.build]
cmd         = "cargo build"
description = "Build both workspace binaries (debug mode)"

[tasks.build-rel]
cmd         = "cargo build --release"
description = "Build both workspace binaries in release mode"

[tasks.test]
cmd         = "cargo test"
description = "Run the test suite"

[tasks.fmt]
cmd         = "cargo fmt"
description = "Auto-format source"

[tasks.clippy]
cmd         = "cargo clippy -- -D warnings"
description = "Run Clippy lints"

[tasks.build-pkg]
cmd = "rattler-build build --recipe recipe/recipe.yaml --output-dir output"
description = "Build the conda packages (sysml-v2-cli, nu_plugin_sysml_v2) from recipe/recipe.yaml"

[tasks.build-pkg-debug]
cmd = "rattler-build build --recipe recipe/recipe.yaml --output-dir output -vv --keep-build"
description = "Build the conda packages with verbose logging, keeping intermediate build artifacts for debugging"

[tasks.render-pkg]
cmd = "rattler-build build --recipe recipe/recipe.yaml --render-only"
description = "Render/validate the recipe without fetching sources or building"

[tasks.clean-pkg]
cmd = "rm -rf output"
description = "Remove the rattler-build output directory"

[tasks.fetch-sysml-library]
cmd = "mkdir -p vendor/sysml.library.kpar && curl -fsSL -o vendor/sysml.library.kpar/SysML_Quantities_and_Units_Library-2.0.0.kpar https://raw.githubusercontent.com/Systems-Modeling/SysML-v2-Release/master/sysml.library.kpar/SysML_Quantities_and_Units_Library-2.0.0.kpar"
description = "Download the OMG SysML v2 Quantities and Units Library .kpar (contains ISQ/SI) from the SysML-v2-Release repo"

[tasks.expand-sysml-library]
cmd = "mkdir -p vendor/sysml.library && unzip -o -q vendor/sysml.library.kpar/SysML_Quantities_and_Units_Library-2.0.0.kpar -d vendor/sysml.library"
depends-on = ["fetch-sysml-library"]
description = "Expand the .kpar (a zip archive) into vendor/sysml.library/ -- pass that directory to --resolve-imports --lib-dir"

[tasks.clean-sysml-library]
cmd = "rm -rf vendor"
description = "Remove the downloaded/expanded sysml.library.kpar files"

[dependencies]
rust = ">=1.80"
rattler-build = ">=0.68.0,<0.69"
curl = "*"
unzip = "*"
