[workspace]
authors = ["Fredrick Eisele <fred.eisele@vanderbilt.edu>"]
channels = ["conda-forge"]
name = "sysml-v2-cli"
platforms = ["linux-64"]
version = "0.1.0"

[tasks.build]
cmd         = "cargo build"
description = "Build the sysml-v2-cli binary (debug mode)"

[tasks.build-rel]
cmd         = "cargo build --release"
description = "Build the sysml-v2-cli binary in release mode"

[tasks.test]
cmd         = "cargo test"
description = "Run the test suite"

[tasks.fmt]
cmd         = "cargo fmt"
description = "Auto-format source"

[tasks.clippy]
cmd         = "cargo clippy -- -D warnings"
description = "Run Clippy lints"

[dependencies]
rust = ">=1.80"
